<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>X-Moto Web</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #111; overflow: hidden; }
    body {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: sans-serif; color: #eee;
    }
    #canvas-wrap {
      position: relative;
      width: 800px; height: 600px;
      max-width: 100vw; max-height: 100vh;
    }
    #canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
    #overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.82); cursor: pointer;
      gap: 0.8rem; transition: opacity 0.3s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    #overlay h1 { font-size: 2.5rem; }
    #overlay p  { font-size: 0.95rem; color: #aaa; }
    #status { margin-top: 0.4rem; font-size: 0.8rem; color: #777; min-height: 1em; text-align: center; max-width: 800px; }
    #progress-wrap { width: 800px; max-width: 90vw; height: 5px; background: #222; border-radius: 2px; overflow: hidden; }
    #progress-bar  { height: 100%; width: 0%; background: #5af; transition: width 0.2s; }
  </style>
</head>
<body>
  <div id="canvas-wrap">
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <div id="overlay">
      <h1>X-Moto</h1>
      <p>Click to start (required for audio)</p>
    </div>
  </div>
  <div id="status"></div>
  <div id="progress-wrap"><div id="progress-bar"></div></div>

  <script>
    var overlay  = document.getElementById('overlay');
    var statusEl = document.getElementById('status');
    var bar      = document.getElementById('progress-bar');

    overlay.addEventListener('click', function() { overlay.classList.add('hidden'); });

    var Module = {
      canvas: document.getElementById('canvas'),

      /* Mount IDBFS before main() starts — avoids Asyncify complications. */
      preRun: [function() {
        Module.addRunDependency('idbfs-init');
        try { FS.mkdir('/xmoto-user'); } catch(e) {}
        FS.mount(IDBFS, {}, '/xmoto-user');
        FS.syncfs(true, function(err) {
          if (err) console.warn('[xmoto] IDBFS read error:', err);
          else     console.log('[xmoto] IDBFS ready at /xmoto-user');
          Module.removeRunDependency('idbfs-init');
        });
      }],

      setStatus: function(text) {
        statusEl.textContent = text;
        var m = text.match(/\((\d+)\/(\d+)\)/);
        if (m) bar.style.width = (100 * parseInt(m[1]) / parseInt(m[2])) + '%';
        else if (!text) bar.style.width = '100%';
      },

      onRuntimeInitialized: function() {
        overlay.classList.add('hidden');
        statusEl.textContent = '';
        bar.style.width = '100%';
        console.log('[xmoto] Runtime ready.');
      },

      print:    function(t) { console.log('[xmoto]', t);  },
      printErr: function(t) { console.warn('[xmoto]', t); },
    };

    window.onerror = function(msg, src, l, c, err) {
      /* Numeric exceptions are Emscripten internals — try to decode them */
      if (typeof err === 'number') {
        var decoded = '';
        try { decoded = Module.getExceptionMessage ? Module.getExceptionMessage(err) : String(err); }
        catch(e) { decoded = String(err); }
        console.error('[xmoto] C++ exception:', decoded);
        statusEl.textContent = 'Startup error: ' + decoded;
        return;
      }
      if (/^\d+$/.test(msg)) { console.warn('[xmoto] Numeric exception (ignored):', msg); return; }
      statusEl.textContent = 'Error: ' + msg;
      console.error('[xmoto] Fatal:', msg, err);
    };

    /* Silence harmless Asyncify sleep integers that surface as unhandled rejections */
    window.addEventListener('unhandledrejection', function(e) {
      if (typeof e.reason === 'number') { e.preventDefault(); return; }
      console.warn('[xmoto] Unhandled rejection:', e.reason);
    });
  </script>
  {{{ SCRIPT }}}
</body>
</html>
