<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>X-Moto Web</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #111; overflow: hidden; }
    body {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: sans-serif; color: #eee;
    }
    #canvas-wrap { position: relative; width: min(100vw, calc(100vh * 4 / 3)); height: min(100vh, calc(100vw * 3 / 4)); }
    #canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

    /* Fullscreen button — top-right corner of the canvas */
    #fs-btn {
      position: absolute; top: 6px; right: 6px; z-index: 10;
      background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.25);
      color: #fff; font-size: 1rem; line-height: 1; padding: 4px 6px;
      border-radius: 4px; cursor: pointer; opacity: 0.6;
      transition: opacity 0.2s;
    }
    #fs-btn:hover { opacity: 1; }
    :fullscreen #canvas-wrap, :-webkit-full-screen #canvas-wrap {
      width: 100vw; height: 100vh;
    }

    /* Loading screen — shown while assets download, auto-hidden once runtime starts */
    #loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #111; gap: 1rem;
      transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading h1 { font-size: 2rem; }
    #loading-status { font-size: 0.8rem; color: #666; min-height: 1em; }
    #progress-wrap { width: 300px; height: 4px; background: #222; border-radius: 2px; overflow: hidden; }
    #progress-bar  { height: 100%; width: 0%; background: #5af; transition: width 0.3s; }

    /* Tiny error banner at the bottom — only visible on fatal errors */
    #error-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #900; color: #fff; font-size: 0.8rem;
      padding: 4px 8px; display: none;
    }

    /* Quit overlay — shown when the game exits cleanly */
    #quit-overlay {
      display: none; position: absolute; inset: 0;
      background: rgba(0,0,0,0.88);
      flex-direction: column; align-items: center; justify-content: center;
      color: #eee; gap: 1.4rem; z-index: 20;
    }
    #quit-overlay h2 { font-size: 1.8rem; }
    #quit-overlay button {
      padding: 0.6rem 2rem; font-size: 1rem;
      background: #5af; border: none; border-radius: 6px;
      color: #000; cursor: pointer;
    }
    #quit-overlay button:hover { background: #7cf; }
  </style>
</head>
<body>
  <div id="canvas-wrap">
    <canvas id="canvas" tabindex="0" oncontextmenu="event.preventDefault()"></canvas>
    <button id="fs-btn" title="Toggle fullscreen (F11)">&#x26F6;</button>
    <div id="quit-overlay">
      <h2>Thanks for playing!</h2>
      <button onclick="location.reload()">Play Again</button>
    </div>
    <div id="loading">
      <h1>X-Moto</h1>
      <div id="loading-status">Loading…</div>
      <div id="progress-wrap"><div id="progress-bar"></div></div>
    </div>
  </div>
  <div id="error-bar"></div>

  <script>
    var loading   = document.getElementById('loading');
    var loadSt    = document.getElementById('loading-status');
    var bar       = document.getElementById('progress-bar');
    var errorBar  = document.getElementById('error-bar');
    var canvas    = document.getElementById('canvas');

    /* Fullscreen toggle */
    document.getElementById('fs-btn').addEventListener('click', function() {
      var wrap = document.getElementById('canvas-wrap');
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        wrap.requestFullscreen().catch(function(e) {
          console.warn('[xmoto] fullscreen error:', e);
        });
      }
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'F11') {
        e.preventDefault();
        document.getElementById('fs-btn').click();
      }
    });

    /* Focus the canvas on any interaction so SDL receives events.
       The first click/keydown also satisfies the browser's autoplay policy,
       which is why we no longer need an explicit "Click to start" overlay — the
       user's first natural interaction with the game (clicking a menu button,
       pressing a key) unlocks audio automatically.                          */
    ['click','keydown','touchstart'].forEach(function(evt) {
      canvas.addEventListener(evt, function() { canvas.focus(); }, { passive: true });
    });

    var Module = {
      canvas: canvas,

      preRun: [function() {
        /* Mount /xmoto-user as IDBFS before main() — no Asyncify needed */
        Module.addRunDependency('idbfs-init');
        try { FS.mkdir('/xmoto-user'); } catch(e) {}
        FS.mount(IDBFS, {}, '/xmoto-user');
        FS.syncfs(true, function(err) {
          if (err) console.warn('[xmoto] IDBFS read error:', err);
          Module.removeRunDependency('idbfs-init');
        });
      }],

      setStatus: function(text) {
        loadSt.textContent = text || 'Ready.';
        var m = text.match(/\((\d+)\/(\d+)\)/);
        if (m) bar.style.width = (100 * parseInt(m[1]) / parseInt(m[2])) + '%';
        else if (!text) bar.style.width = '100%';
      },

      onRuntimeInitialized: function() {
        /* Hide loading screen and give canvas focus immediately — the game
           renders its own first frame and no click-to-start is required.  */
        loading.classList.add('hidden');
        bar.style.width = '100%';
        canvas.focus();
        console.log('[xmoto] Runtime ready.');

        /* Called by C++ (EM_ASM) when the game exits via the Quit menu. */
        Module.onGameQuit = function() {
          document.getElementById('quit-overlay').style.display = 'flex';
        };

        /* ---- Persistent storage: keep IDBFS synced to IndexedDB ----
           syncfs(false,...) flushes in-memory writes → IndexedDB.
           We do this:
             1. Every 10 s via setInterval (catches incremental saves).
             2. Immediately when the page becomes hidden (tab switch,
                navigate away, refresh) — most reliable pre-unload hook. */
        function persistNow() {
          /* Guard: don't issue a second syncfs while one is already running. */
          if (persistNow._inFlight) return;
          persistNow._inFlight = true;
          try { if (Module._xmoto_save_config) Module._xmoto_save_config(); } catch(e) {}
          try {
            FS.syncfs(false, function(err) {
              persistNow._inFlight = false;
              if (err) console.warn('[xmoto] IDBFS sync error:', err);
            });
          } catch(e) { persistNow._inFlight = false; }
        }
        persistNow._inFlight = false;

        setInterval(persistNow, 10000);

        document.addEventListener('visibilitychange', function() {
          if (document.hidden) persistNow();
        });
      },

      print:    function(t) { console.log('[xmoto]', t);  },
      printErr: function(t) { console.warn('[xmoto]', t); },
    };

    window.onerror = function(msg, src, l, c, err) {
      if (typeof err === 'number' || /^\d+$/.test(msg)) return; /* Emscripten internals */
      /* Show the crash message in the error bar AND log the full stack */
      errorBar.textContent = 'Crash: ' + msg;
      errorBar.style.display = 'block';
      console.error('[xmoto] Crash:', msg);
      if (err && err.stack) console.error(err.stack);
    };

    window.addEventListener('unhandledrejection', function(e) {
      if (typeof e.reason === 'number') { e.preventDefault(); }
    });
  </script>
  <script>
    /* Register Service Worker to cache .wasm/.data/.js across Ctrl+R reloads.
       Ctrl+Shift+R bypasses the SW and always fetches fresh files.           */
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(function(e) {
        console.warn('[xmoto] SW registration failed:', e);
      });
    }
  </script>
  {{{ SCRIPT }}}
</body>
</html>
