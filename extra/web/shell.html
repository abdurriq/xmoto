<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>X-Moto Web</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #111; overflow: hidden; }
    body {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: sans-serif; color: #eee;
    }
    #canvas-wrap { position: relative; width: 800px; height: 600px; max-width: 100vw; max-height: 100vh; }
    #canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

    /* Loading screen — shown while assets download, auto-hidden once runtime starts */
    #loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #111; gap: 1rem;
      transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading h1 { font-size: 2rem; }
    #loading-status { font-size: 0.8rem; color: #666; min-height: 1em; }
    #progress-wrap { width: 300px; height: 4px; background: #222; border-radius: 2px; overflow: hidden; }
    #progress-bar  { height: 100%; width: 0%; background: #5af; transition: width 0.3s; }

    /* Tiny error banner at the bottom — only visible on fatal errors */
    #error-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #900; color: #fff; font-size: 0.8rem;
      padding: 4px 8px; display: none;
    }
  </style>
</head>
<body>
  <div id="canvas-wrap">
    <canvas id="canvas" tabindex="0" oncontextmenu="event.preventDefault()"></canvas>
    <div id="loading">
      <h1>X-Moto</h1>
      <div id="loading-status">Loading…</div>
      <div id="progress-wrap"><div id="progress-bar"></div></div>
    </div>
  </div>
  <div id="error-bar"></div>

  <script>
    var loading   = document.getElementById('loading');
    var loadSt    = document.getElementById('loading-status');
    var bar       = document.getElementById('progress-bar');
    var errorBar  = document.getElementById('error-bar');
    var canvas    = document.getElementById('canvas');

    /* Focus the canvas on any interaction so SDL receives events.
       The first click/keydown also satisfies the browser's autoplay policy,
       which is why we no longer need an explicit "Click to start" overlay — the
       user's first natural interaction with the game (clicking a menu button,
       pressing a key) unlocks audio automatically.                          */
    ['click','keydown','touchstart'].forEach(function(evt) {
      canvas.addEventListener(evt, function() { canvas.focus(); }, { passive: true });
    });

    var Module = {
      canvas: canvas,

      preRun: [function() {
        /* Mount /xmoto-user as IDBFS before main() — no Asyncify needed */
        Module.addRunDependency('idbfs-init');
        try { FS.mkdir('/xmoto-user'); } catch(e) {}
        FS.mount(IDBFS, {}, '/xmoto-user');
        FS.syncfs(true, function(err) {
          if (err) console.warn('[xmoto] IDBFS read error:', err);
          Module.removeRunDependency('idbfs-init');
        });
      }],

      setStatus: function(text) {
        loadSt.textContent = text || 'Ready.';
        var m = text.match(/\((\d+)\/(\d+)\)/);
        if (m) bar.style.width = (100 * parseInt(m[1]) / parseInt(m[2])) + '%';
        else if (!text) bar.style.width = '100%';
      },

      onRuntimeInitialized: function() {
        /* Hide loading screen and give canvas focus immediately — the game
           renders its own first frame and no click-to-start is required.  */
        loading.classList.add('hidden');
        bar.style.width = '100%';
        canvas.focus();
        console.log('[xmoto] Runtime ready.');

        /* ---- Persistent storage: keep IDBFS synced to IndexedDB ----
           syncfs(false,...) flushes in-memory writes → IndexedDB.
           We do this:
             1. Every 10 s via setInterval (catches incremental saves).
             2. Immediately when the page becomes hidden (tab switch,
                navigate away, refresh) — most reliable pre-unload hook. */
        function persistNow() {
          try {
            FS.syncfs(false, function(err) {
              if (err) console.warn('[xmoto] IDBFS sync error:', err);
            });
          } catch(e) { /* FS not yet ready */ }
        }

        setInterval(persistNow, 10000);

        document.addEventListener('visibilitychange', function() {
          if (document.hidden) persistNow();
        });
      },

      print:    function(t) { console.log('[xmoto]', t);  },
      printErr: function(t) { console.warn('[xmoto]', t); },
    };

    window.onerror = function(msg, src, l, c, err) {
      if (typeof err === 'number' || /^\d+$/.test(msg)) return; /* Emscripten internals */
      /* Show the crash message in the error bar AND log the full stack */
      errorBar.textContent = 'Crash: ' + msg;
      errorBar.style.display = 'block';
      console.error('[xmoto] Crash:', msg);
      if (err && err.stack) console.error(err.stack);
    };

    window.addEventListener('unhandledrejection', function(e) {
      if (typeof e.reason === 'number') { e.preventDefault(); }
    });
  </script>
  {{{ SCRIPT }}}
</body>
</html>
