name: Web Build & Deploy (Emscripten)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress on new push
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-web:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # ── Emscripten SDK ──────────────────────────────────────────────────────
      - name: Install Emscripten 3.1.50
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.50
          actions-cache-folder: .emsdk-cache

      # ── libxml2 (vendored, built for WASM) ──────────────────────────────────
      - name: Cache libxml2 WASM build
        id: cache-libxml2
        uses: actions/cache@v4
        with:
          path: vendor/libxml2
          key: libxml2-wasm-2.9.14-emsdk-3.1.50

      - name: Download & unpack libxml2 source
        if: steps.cache-libxml2.outputs.cache-hit != 'true'
        run: |
          mkdir -p vendor/libxml2
          curl -sL "https://download.gnome.org/sources/libxml2/2.9/libxml2-2.9.14.tar.xz" \
            | tar -xJ -C vendor/libxml2 --strip-components=1

      # ── CMake configure ─────────────────────────────────────────────────────
      - name: Pre-build Emscripten ports (zlib, libpng, etc.)
        run: embuilder build zlib libpng libjpeg sdl2 sdl2_ttf sdl2_mixer sqlite3 freetype

      - name: Configure WASM build
        run: |
          SYSROOT=$(emcc --print-sysroot)
          mkdir -p build-web
          cd build-web
          emcmake cmake .. \
            -DEMSCRIPTEN_BUILD=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DZLIB_INCLUDE_DIR="${SYSROOT}/include" \
            -DZLIB_LIBRARY="${SYSROOT}/lib/wasm32-emscripten/libz.a"

      # ── Compile & link ──────────────────────────────────────────────────────
      - name: Build
        run: |
          cd build-web
          emmake make -j$(nproc) 2>&1 | tail -5

      # ── Verify outputs ──────────────────────────────────────────────────────
      - name: Check build outputs
        run: |
          ls -lh build-web/src/xmoto.{html,js,wasm,data}
          echo "Build succeeded."

      # ── Optional: custom domain CNAME ───────────────────────────────────────
      # To use a custom domain (e.g. xmoto.example.com), set the
      # PAGES_CUSTOM_DOMAIN secret in Settings → Secrets and variables → Actions.
      # Then point a CNAME DNS record to abdurriq.github.io.
      # Leave unset to use the default https://abdurriq.github.io/xmoto/
      - name: Write CNAME (custom domain)
        if: ${{ env.PAGES_CUSTOM_DOMAIN != '' }}
        env:
          PAGES_CUSTOM_DOMAIN: ${{ secrets.PAGES_CUSTOM_DOMAIN }}
        run: echo "$PAGES_CUSTOM_DOMAIN" > build-web/src/CNAME

      # ── Upload Pages artifact ────────────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build-web/src

      # ── Also keep the named artifact for download ───────────────────────────
      - name: Upload build artifact (download)
        uses: actions/upload-artifact@v4
        with:
          name: xmoto-web-${{ github.sha }}
          path: |
            build-web/src/xmoto.html
            build-web/src/xmoto.js
            build-web/src/xmoto.wasm
            build-web/src/xmoto.data
            build-web/src/sw.js
          retention-days: 30

  # ── Deploy to GitHub Pages (only on push to master, not PRs) ───────────────
  deploy:
    needs: build-web
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
